services:
  postgres:
    image: postgres:16
    container_name: postgres-api-financas
    restart: always
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: bd-api-financas
      POSTGRES_USER: coti
      POSTGRES_PASSWORD: coti
    volumes:
      - postgres-api-financas-data:/var/lib/postgresql/data
    networks:
      - api-financas-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-api-financas
    restart: always
    ports:
      - "5056:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: coti@email.com
      PGADMIN_DEFAULT_PASSWORD: Coti@2026
    volumes:
      - pgadmin-api-financas-data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - api-financas-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-api-financas
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: coti
      RABBITMQ_DEFAULT_PASS: coti
    volumes:
      - rabbitmq-api-financas-data:/var/lib/rabbitmq
    networks:
      - api-financas-network

volumes:
  postgres-api-financas-data:
  pgadmin-api-financas-data:
  rabbitmq-api-financas-data:

networks:
  api-financas-network:
    driver: bridge